name: Beta Release

on:
  push:
    branches:
      - beta
  workflow_dispatch:

jobs:
  release:
    name: Create Beta Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Version from manifest.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' custom_components/neoom/manifest.json)
          echo "VERSION=v$VERSION" >> $GITHUB_ENV
          echo "CLEAN_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Version found: $VERSION"

      - name: Zip component directory
        run: |
          cd custom_components/neoom
          zip -r ../../neoom.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Beta Release ${{ env.VERSION }}
          files: neoom.zip
          generate_release_notes: true
          draft: false
          prerelease: true
