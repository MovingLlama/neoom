name: Stable Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    name: Create Stable Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Version from manifest.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' custom_components/neoom/manifest.json)
          echo "VERSION=v$VERSION" >> $GITHUB_ENV
          echo "CLEAN_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Version found: $VERSION"
          if [[ "$VERSION" == *"beta"* || "$VERSION" == *"alpha"* || "$VERSION" == *"rc"* ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
            echo "Prerelease detected: true"
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
            echo "Prerelease detected: false"
          fi

      - name: Zip component directory
        run: |
          cd custom_components/neoom
          zip -r ../../neoom.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          files: neoom.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ env.IS_PRERELEASE }}
